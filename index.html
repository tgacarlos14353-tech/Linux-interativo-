<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linux ConnectTech Network Infrastructure</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Linux ConnectTech Network Infrastructure</h1>
<p>Painel de Infraestrutura de Rede</p>

</header>


<section class="network">

<h2>Topologia da Rede</h2>

<div class="machines">

<div class="machine router">

<h3>VM Router</h3>
<p>IP: 172.16.50.1</p>

</div>

<div class="machine server">

<h3>VM Servidor</h3>
<p>IP: 172.16.50.10</p>

</div>

<div class="machine client">

<h3>VM Cliente</h3>
<p>DHCP</p>

</div>

</div>

</section>


<section class="terminal-section">

<h2>Terminal de Monitoramento</h2>

<div class="terminal">

<div id="terminal-output"></div>

<input type="text" id="terminal-input" placeholder="Digite um comando...">

</div>

</section>


<footer>

<p>Aluno: Patrick Alves</p>
<p>Instituto de Gouveia</p>

</footer>

<script src="script.js"></script>

</body>
</html>
